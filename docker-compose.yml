services:
  cantinarr:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8585:8585"
    volumes:
      - ./config:/config
    environment:
      - CANTINARR_TMDB_KEY=${CANTINARR_TMDB_KEY}
      - CANTINARR_ADMIN_PASSWORD=${CANTINARR_ADMIN_PASSWORD}
      - CANTINARR_RADARR_URL=${CANTINARR_RADARR_URL:-}
      - CANTINARR_RADARR_KEY=${CANTINARR_RADARR_KEY:-}
      - CANTINARR_SONARR_URL=${CANTINARR_SONARR_URL:-}
      - CANTINARR_SONARR_KEY=${CANTINARR_SONARR_KEY:-}
      - CANTINARR_TRAKT_CLIENT_ID=${CANTINARR_TRAKT_CLIENT_ID:-}
      - CANTINARR_TRAKT_CLIENT_SECRET=${CANTINARR_TRAKT_CLIENT_SECRET:-}
      - CANTINARR_ANTHROPIC_KEY=${CANTINARR_ANTHROPIC_KEY:-}
    restart: unless-stopped
