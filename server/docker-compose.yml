version: '3.8'
services:
  cantinarr:
    build: .
    ports:
      - "8585:8585"
    volumes:
      - ./config:/config
      # Optional completed-media downloads. Mount each library read-only,
      # allowlist its Cantinarr-visible parent in CANTINARR_MEDIA_ROOTS below,
      # then map each arr-reported path in that instance's app settings. The
      # arr and Cantinarr paths may differ. Example:
      # - /mnt/nas/media:/media:ro
    environment:
      # Comma-separated absolute container paths forming the outer media
      # allowlist. Empty keeps completed-media downloads disabled.
      - CANTINARR_MEDIA_ROOTS=${CANTINARR_MEDIA_ROOTS:-}
