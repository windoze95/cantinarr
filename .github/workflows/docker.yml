name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "app/**"
      - "server/**"
      - "Dockerfile"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "server/**"
      - "Dockerfile"
      - ".github/workflows/docker.yml"
  workflow_dispatch:
    inputs:
      multi-arch:
        description: "Build for arm64 in addition to amd64"
        type: boolean
        default: false

concurrency:
  group: docker-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/v') || inputs.multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/windoze95/cantinarr
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build published image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          platforms: linux/amd64
          load: true
          push: false
          tags: cantinarr-root-smoke:${{ github.sha }}
          cache-from: type=gha,scope=published
          cache-to: type=gha,mode=max,scope=published

      - name: Verify published-image Codex runtime and notices
        run: |
          docker run --rm cantinarr-root-smoke:${{ github.sha }} sh -ec '
            test -x /usr/local/bin/codex-app-server
            test -s /usr/share/licenses/codex-app-server/LICENSE
            test -s /usr/share/licenses/codex-app-server/NOTICE
            /usr/local/bin/codex-app-server --help | grep -q -- --listen
          '

      - name: Build arm64 published image for smoke test
        if: startsWith(github.ref, 'refs/tags/v') || inputs.multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          platforms: linux/arm64
          load: true
          push: false
          tags: cantinarr-root-arm64-smoke:${{ github.sha }}
          cache-from: type=gha,scope=published
          cache-to: type=gha,mode=max,scope=published

      - name: Verify arm64 Codex runtime and notices
        if: startsWith(github.ref, 'refs/tags/v') || inputs.multi-arch
        run: |
          docker run --rm --platform linux/arm64 cantinarr-root-arm64-smoke:${{ github.sha }} sh -ec '
            test -x /usr/local/bin/codex-app-server
            test -s /usr/share/licenses/codex-app-server/LICENSE
            test -s /usr/share/licenses/codex-app-server/NOTICE
            /usr/local/bin/codex-app-server --help | grep -q -- --listen
          '

      - name: Build server-only image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: cantinarr-server-smoke:${{ github.sha }}
          cache-from: type=gha,scope=server-only
          cache-to: type=gha,mode=max,scope=server-only

      - name: Verify server-only Codex runtime and notices
        run: |
          docker run --rm cantinarr-server-smoke:${{ github.sha }} sh -ec '
            test -x /usr/local/bin/codex-app-server
            test -s /usr/share/licenses/codex-app-server/LICENSE
            test -s /usr/share/licenses/codex-app-server/NOTICE
            /usr/local/bin/codex-app-server --help | grep -q -- --listen
          '

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          platforms: ${{ (startsWith(github.ref, 'refs/tags/v') || inputs.multi-arch) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=published
          cache-to: type=gha,mode=max,scope=published
