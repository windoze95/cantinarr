name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '23 5 * * 1'

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-catalog:
    name: Test catalog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate automation traceability
        run: make check-test-automation

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Vet
        run: go vet ./...

      - name: Cache pinned Codex app-server
        id: codex-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/codex-app-server-x86_64-unknown-linux-musl.tar.gz
          key: codex-app-server-linux-amd64-0.144.3-6fa4467489ac5a0a

      - name: Download pinned Codex app-server
        if: steps.codex-cache.outputs.cache-hit != 'true'
        run: |
          archive="$RUNNER_TEMP/codex-app-server-x86_64-unknown-linux-musl.tar.gz"
          curl --fail --location --retry 3 \
            https://github.com/openai/codex/releases/download/rust-v0.144.3/codex-app-server-x86_64-unknown-linux-musl.tar.gz \
            --output "$archive"

      - name: Verify and enable real Codex protocol smoke
        run: |
          archive="$RUNNER_TEMP/codex-app-server-x86_64-unknown-linux-musl.tar.gz"
          echo "6fa4467489ac5a0ae5bf0057d39f6d14a7f50f5fa70b8a10933888d92d1b75ab  $archive" | sha256sum -c -
          tar -xzf "$archive" -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/codex-app-server-x86_64-unknown-linux-musl" "$RUNNER_TEMP/codex-app-server"
          echo "CANTINARR_CODEX_APP_SERVER_SMOKE_BINARY=$RUNNER_TEMP/codex-app-server" >> "$GITHUB_ENV"

      - name: Test
        run: go test -race ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o cantinarr ./cmd/server

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release
