name: Deploy Site

# The marketing site (cantinarr.com) lives in site/ and deploys to Cloudflare
# Pages on merge to main. Requires the CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID secrets; without them the deploy is skipped (deploy
# manually with `npx wrangler pages deploy site --project-name=cantinarr`).
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:
    inputs:
      handoff_secrets:
        description: Hand off the existing Cloudflare deploy secrets to cantinarr-site
        required: false
        default: false
        type: boolean

concurrency:
  group: site
  cancel-in-progress: false

jobs:
  handoff:
    if: ${{ inputs.handoff_secrets == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Transfer encrypted deploy secrets
        env:
          GH_TOKEN: ${{ secrets.SITE_REPO_MIGRATION_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$GH_TOKEN"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          printf '%s' "$CLOUDFLARE_API_TOKEN" | gh secret set CLOUDFLARE_API_TOKEN --repo windoze95/cantinarr-site
          printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | gh secret set CLOUDFLARE_ACCOUNT_ID --repo windoze95/cantinarr-site
          gh secret list --repo windoze95/cantinarr-site

  deploy:
    if: ${{ inputs.handoff_secrets != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check Cloudflare credentials
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID are not set - skipping the Cloudflare Pages deploy."
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=cantinarr --branch=main
